<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国水稻产量、面积与亩产量变化趋势 (1949-2024)</title>
    <!-- 引入 ECharts 核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            font-family: 'Segoe UI', 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }
        .chart-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            padding: 24px 20px 20px 20px;
        }
        .header {
            margin-bottom: 16px;
            padding-left: 12px;
            border-left: 6px solid #2d8c3c;
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1e2f3e;
        }
        .header p {
            color: #5a6e7c;
            margin-top: 8px;
            font-size: 0.85rem;
        }
        .subnote {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin: 12px 0;
            padding: 0 12px;
            font-size: 0.8rem;
            color: #5f7f9e;
        }
        .legend-tip {
            background: #f0f2f5;
            padding: 4px 12px;
            border-radius: 20px;
        }
        #mainChart {
            width: 100%;
            height: 600px;
            margin-top: 8px;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.75rem;
            color: #7e8c8f;
            border-top: 1px solid #e2e8f0;
            padding-top: 16px;
        }
        @media (max-width: 700px) {
            .chart-container { padding: 16px; }
            .header h1 { font-size: 1.2rem; }
            #mainChart { height: 500px; }
        }
    </style>
</head>
<body>
<div class="chart-container">
    <div class="header">
        <h1>🌾 中国水稻生产趋势 (1949–2024)</h1>
        <p>数据来源：国家统计局 | 总产量(万吨) / 种植面积(千公顷) / 亩产量(公斤/亩)</p>
    </div>
    <div class="subnote">
    
    </div>
    <div id="mainChart"></div>
    
</div>

<script>
    // ----- 原始数据 [年份, 产量(万吨), 面积(千公顷)] -----
    const rawData = [
        [1949, 4864.8, 25708.5], [1950, 5510.7, 26149.3], [1951, 6055.9, 26933.3], [1952, 6843.3, 28382.3],
        [1953, 7128, 28321.1], [1954, 7086, 28721.8], [1955, 7803.1, 29173.4], [1956, 8248.7, 33311.8],
        [1957, 8678, 32241.1], [1958, 8085.3, 31915.1], [1959, 6936.8, 29034.2], [1960, 5973.3, 29607.2],
        [1961, 5364.8, 26275.9], [1962, 6299.1, 26934.5], [1963, 7376.5, 27715], [1964, 8300, 29606.6],
        [1965, 8772, 29824.7], [1966, 9539, 30528.7], [1967, 9368.5, 30430.2], [1968, 9453, 29894],
        [1969, 9506.5, 30432], [1970, 10999, 32358.1], [1971, 11520.5, 34918.3], [1972, 11335.5, 35142.5],
        [1973, 12173.5, 35089.7], [1974, 12390.5, 35512], [1975, 12556, 35728.1], [1976, 12580.5, 36217.4],
        [1977, 12856.5, 35526.1], [1978, 13693, 34420.87], [1979, 14375, 33872.67], [1980, 13990.5, 33878.47],
        [1981, 14395.5, 33294.73], [1982, 16159.5, 33071.07], [1983, 16886.5, 33136.33], [1984, 17825.5, 33178.4],
        [1985, 16856.9, 32070.07], [1986, 17222.4, 32266.13], [1987, 17441.6, 32192.8], [1988, 16910.74, 31987.47],
        [1989, 18013, 32700.4], [1990, 18933.14, 33064.47], [1991, 18381.3, 32590], [1992, 18622.2, 32090.2],
        [1993, 17751.4, 30355.2], [1994, 17593.3, 30171.4], [1995, 18522.6, 30744.1], [1996, 19510.27, 31406.77],
        [1997, 20073.48, 31764.87], [1998, 19871.3, 31213.8], [1999, 19848.73, 31283.49], [2000, 18790.77, 29961.72],
        [2001, 17758.03, 28812.38], [2002, 17453.85, 28201.6], [2003, 16065.56, 26507.83], [2004, 17908.76, 28378.8],
        [2005, 18058.84, 28847.18], [2006, 18171.83, 28937.89], [2007, 18638.11, 28972.75], [2008, 19261.22, 29350.26],
        [2009, 19619.67, 29793.01], [2010, 19722.57, 30096.87], [2011, 20288.25, 30338.41], [2012, 20653.23, 30475.97],
        [2013, 20628.56, 30709.74], [2014, 20960.91, 30765.12], [2015, 21214.19, 30784.09], [2016, 21109.42, 30745.89],
        [2017, 21267.59, 30747.19], [2018, 21212.9, 30189.45], [2019, 20961.4, 29693.52], [2020, 21185.96, 30075.53],
        [2021, 21284.24, 29921.15], [2022, 20849.48, 29450.11], [2023, 20660.32, 28949.06], [2024, 20753.49, 29006.92]
    ];

    // 提取年份、产量、面积，并计算亩产量
    const years = rawData.map(item => item[0]);
    const outputs = rawData.map(item => item[1]);      // 单位：万吨
    const areas = rawData.map(item => item[2]);        // 单位：千公顷
    
    // 亩产量(公斤/亩) = (总产量(万吨) × 10000 × 1000) ÷ (种植面积(千公顷) × 1000 × 15)
    // 简化公式：亩产量 = (产量 × 10000) / (面积 × 15)
    const yieldPerMu = rawData.map(item => {
        const outputWanTun = item[1];      // 万吨
        const areaQianGongQing = item[2];  // 千公顷
        const muYield = (outputWanTun * 10000) / (areaQianGongQing * 15);
        return parseFloat(muYield.toFixed(1));
    });

    // 计算各数据的最小最大值
    const maxOutput = Math.max(...outputs);
    const minOutput = Math.min(...outputs);
    const maxArea = Math.max(...areas);
    const minArea = Math.min(...areas);
    const maxYield = Math.max(...yieldPerMu);
    const minYield = Math.min(...yieldPerMu);

    // 动态设置Y轴范围，避免单位重叠
    const outputRange = { min: Math.floor(minOutput / 1000) * 1000 - 1000, max: Math.ceil(maxOutput / 1000) * 1000 + 1000 };
    const areaRange = { min: Math.floor(minArea / 5000) * 5000 - 5000, max: Math.ceil(maxArea / 5000) * 5000 + 5000 };
    const yieldRange = { min: Math.floor(minYield / 50) * 50 - 50, max: Math.ceil(maxYield / 50) * 50 + 50 };

    // 初始化 ECharts
    const chartDom = document.getElementById('mainChart');
    const myChart = echarts.init(chartDom);

    const option = {
        backgroundColor: 'transparent',
        toolbox: {
            feature: {
                dataZoom: {
                    yAxisIndex: 'none',
                    title: { zoom: '区域缩放', back: '还原' }
                },
                restore: { title: '重置' },
                saveAsImage: { title: '保存为图片', name: '中国水稻生产趋势图' }
            },
            right: 20,
            top: 0,
            iconSize: 16
        },
        tooltip: {
            trigger: 'axis',
            axisPointer: { type: 'shadow' },
            backgroundColor: 'rgba(20,25,35,0.92)',
            borderColor: '#2d8c3c',
            borderWidth: 2,
            textStyle: { color: '#f0f0f0', fontSize: 12 },
            formatter: function(params) {
                if (!params || params.length === 0) return '';
                let result = `<strong>📅 ${params[0].axisValue} 年</strong><br/>`;
                for (let i = 0; i < params.length; i++) {
                    const p = params[i];
                    const seriesName = p.seriesName;
                    let value = p.value;
                    let unit = '';
                    if (seriesName === '稻谷总产量') {
                        unit = ' 万吨';
                        value = value.toFixed(2);
                    } else if (seriesName === '种植面积') {
                        unit = ' 千公顷';
                        value = value.toFixed(2);
                    } else if (seriesName === '亩产量') {
                        unit = ' 公斤/亩';
                        value = value.toFixed(1);
                    }
                    const color = p.color;
                    result += `<span style="display:inline-block;margin-right:5px;border-radius:10px;width:10px;height:10px;background-color:${color};"></span>`;
                    result += `${seriesName}: <span style="font-weight:bold;">${value}${unit}</span><br/>`;
                }
                return result;
            }
        },
        legend: {
            data: ['稻谷总产量', '种植面积', '亩产量'],
            left: 'center',      // 水平居中
            top: 0,              // 顶部对齐
            icon: 'circle',
            textStyle: { color: '#2c3e44', fontWeight: '500' },
            itemWidth: 25,
            itemHeight: 12
        },
        grid: {
            left: '8%',
            right: '12%',        // 右侧留出更多空间避免Y轴单位重叠
            bottom: '10%',
            top: '15%',          // 顶部留出空间给图例
            backgroundColor: '#fefef9',
            containLabel: false
        },
        xAxis: {
            type: 'category',
            data: years,
            name: '年份',
            nameLocation: 'middle',
            nameGap: 35,
            axisLabel: {
                rotate: 45,
                interval: 'auto',
                fontSize: 10,
                color: '#4a5b66'
            },
            axisLine: { lineStyle: { color: '#8ba0ae', width: 1.5 } },
            axisTick: { show: false },
            splitLine: { show: false }
        },
        yAxis: [
            {
                type: 'value',
                name: '总产量 (万吨)',
                nameLocation: 'middle',
                nameGap: 45,
                min: outputRange.min,
                max: outputRange.max,
                axisLabel: { fontSize: 10 },
                splitLine: { lineStyle: { type: 'dashed', color: '#cdd9e6' } },
                position: 'left'
            },
            {
                type: 'value',
                name: '种植面积 (千公顷)',
                nameLocation: 'middle',
                nameGap: 50,
                min: areaRange.min,
                max: areaRange.max,
                axisLabel: { fontSize: 10 },
                splitLine: { show: false },
                position: 'right',
                offset: 0
            },
            {
                type: 'value',
                name: '亩产量 (公斤/亩)',
                nameLocation: 'middle',
                nameGap: 45,
                min: yieldRange.min,
                max: yieldRange.max,
                axisLabel: { fontSize: 10 },
                splitLine: { show: false },
                position: 'right',
                offset: 60              // 向右偏移60px，避免与种植面积的Y轴单位重叠
            }
        ],
        dataZoom: [
            {
                type: 'inside',
                start: 0,
                end: 100,
                minValueSpan: 5,
                zoomOnMouseWheel: true,
                moveOnMouseMove: true
            },
            {
                type: 'slider',
                start: 0,
                end: 100,
                bottom: 5,
                height: 20,
                borderColor: '#bdd4e2',
                fillerColor: 'rgba(45, 140, 60, 0.2)',
                handleStyle: { color: '#2d8c3c' }
            }
        ],
        series: [
            {
                name: '稻谷总产量',
                type: 'line',
                data: outputs,
                smooth: false,
                symbol: 'circle',
                symbolSize: 4,
                yAxisIndex: 0,
                lineStyle: { width: 2.5, color: '#2b7a3e' },
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: 'rgba(43, 122, 62, 0.3)' },
                        { offset: 1, color: 'rgba(43, 122, 62, 0.02)' }
                    ])
                },
                itemStyle: { color: '#1f6e2f', borderColor: '#fff', borderWidth: 1 },
                emphasis: { focus: 'series', scale: 1.2 },
                markPoint: {
                    data: [
                        { type: 'max', name: '产量最高点', symbolSize: 22 },
                        { type: 'min', name: '产量最低点', symbolSize: 18 }
                    ],
                    symbol: 'circle',
                    symbolSize: 18,
                    label: {
                        formatter: function(params) {
                            if (params.name === '产量最高点') return `🔝 ${params.value.toFixed(0)}万吨`;
                            return `📉 ${params.value.toFixed(0)}万吨`;
                        },
                        fontSize: 9,
                        offset: [0, -15],
                        backgroundColor: 'rgba(0,0,0,0.65)',
                        padding: [2, 6, 2, 6],
                        borderRadius: 12,
                        color: '#fff'
                    }
                }
            },
            {
                name: '种植面积',
                type: 'line',
                data: areas,
                smooth: false,
                symbol: 'diamond',
                symbolSize: 4,
                yAxisIndex: 1,
                lineStyle: { width: 2.5, color: '#f39c12', type: 'solid' },
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: 'rgba(243, 156, 18, 0.2)' },
                        { offset: 1, color: 'rgba(243, 156, 18, 0.01)' }
                    ])
                },
                itemStyle: { color: '#e67e22', borderColor: '#fff', borderWidth: 1 },
                emphasis: { focus: 'series', scale: 1.2 },
                markPoint: {
                    data: [
                        { type: 'max', name: '面积最高点', symbolSize: 22 },
                        { type: 'min', name: '面积最低点', symbolSize: 18 }
                    ],
                    symbol: 'circle',
                    symbolSize: 18,
                    label: {
                        formatter: function(params) {
                            if (params.name === '面积最高点') return `🔝 ${params.value.toFixed(0)}千公顷`;
                            return `📉 ${params.value.toFixed(0)}千公顷`;
                        },
                        fontSize: 9,
                        offset: [0, -15],
                        backgroundColor: 'rgba(0,0,0,0.65)',
                        padding: [2, 6, 2, 6],
                        borderRadius: 12,
                        color: '#fff'
                    }
                }
            },
            {
                name: '亩产量',
                type: 'line',
                data: yieldPerMu,
                smooth: false,
                symbol: 'triangle',
                symbolSize: 4,
                yAxisIndex: 2,
                lineStyle: { width: 2.5, color: '#2980b9', type: 'solid' },
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: 'rgba(41, 128, 185, 0.2)' },
                        { offset: 1, color: 'rgba(41, 128, 185, 0.01)' }
                    ])
                },
                itemStyle: { color: '#1a6da0', borderColor: '#fff', borderWidth: 1 },
                emphasis: { focus: 'series', scale: 1.2 },
                markPoint: {
                    data: [
                        { type: 'max', name: '亩产最高点', symbolSize: 22 },
                        { type: 'min', name: '亩产最低点', symbolSize: 18 }
                    ],
                    symbol: 'circle',
                    symbolSize: 18,
                    label: {
                        formatter: function(params) {
                            if (params.name === '亩产最高点') return `🔝 ${params.value.toFixed(0)}公斤/亩`;
                            return `📉 ${params.value.toFixed(0)}公斤/亩`;
                        },
                        fontSize: 9,
                        offset: [0, -15],
                        backgroundColor: 'rgba(0,0,0,0.65)',
                        padding: [2, 6, 2, 6],
                        borderRadius: 12,
                        color: '#fff'
                    }
                }
            }
        ],
        graphic: [
            {
                type: 'text',
                left: '1%',
                top: 30,
                style: { text: '📊 1949~2024', fill: '#6f8f9f', fontSize: 11 },
                z: 100
            }
        ]
    };

    myChart.setOption(option);
    window.addEventListener('resize', () => myChart.resize());
</script>
</body>
</html>
